<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ICONIX</title>
    <meta name="description" content="ICONIX — Explore the latest posts, tours, and stories." />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236c5ce7'/><text x='50' y='68' font-size='52' font-weight='900' text-anchor='middle' fill='white'>I</text></svg>" />
    <link rel="stylesheet" href="/style.css" />
</head>

<body>

    <div class="iframe-wrapper fullscreen" id="iframe-wrapper">
        <div class="loader" id="loader">
            <div class="loader__spinner"></div>
            <span class="loader__text">Loading ICONIX…</span>
        </div>

        <iframe id="blog-frame" class="iframe-wrapper__frame" src="" title="ICONIX Blog" loading="eager"
            sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-popups-to-escape-sandbox"
            referrerpolicy="no-referrer-when-downgrade"></iframe>

        <div class="fallback" id="fallback">
            <div class="fallback__icon">📝</div>
            <h1 class="fallback__heading">ICONIX</h1>
            <p class="fallback__subtext">
                The blog content is best viewed directly on our Blogspot site.
                Click below to read the latest posts, tours, and stories.
            </p>
            <a href="" id="fallback-link" target="_blank" rel="noopener noreferrer" class="fallback__btn">
                Open ICONIX Blog
                <span>→</span>
            </a>
            <span class="fallback__link">iconix254.blogspot.com</span>
        </div>
    </div>

    <script>
        (() => {
            // Smart routing: map the current path to the matching Blogspot URL
            const path = window.location.pathname;
            const blogBase = 'https://iconix254.blogspot.com';
            let blogUrl;

            if (path === '/' || path === '/index.html' || path === '') {
                blogUrl = blogBase + '/';
            } else {
                // Mirror path: /2026/03/tour.html → blogspot.com/2026/03/tour.html
                blogUrl = blogBase + path;
            }

            const iframe = document.getElementById('blog-frame');
            const loader = document.getElementById('loader');
            const fallback = document.getElementById('fallback');
            const fallbackLink = document.getElementById('fallback-link');

            // Set the iframe src and fallback link
            iframe.src = blogUrl;
            fallbackLink.href = blogUrl;

            let loaded = false;

            iframe.addEventListener('load', () => {
                loaded = true;
                loader.classList.add('hidden');
                iframe.classList.add('loaded');
            });

            setTimeout(() => {
                if (!loaded) {
                    showFallback();
                } else {
                    try {
                        const doc = iframe.contentDocument || iframe.contentWindow.document;
                        if (!doc || !doc.body || doc.body.innerHTML.length < 50) {
                            showFallback();
                        }
                    } catch (e) { /* cross-origin — keep iframe */ }
                }
            }, 6000);

            function showFallback() {
                loader.classList.add('hidden');
                iframe.style.display = 'none';
                fallback.classList.add('active');
            }
        })();
    </script>
</body>

</html>
